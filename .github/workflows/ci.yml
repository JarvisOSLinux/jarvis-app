name: CI

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Format
        working-directory: rust
        run: cargo fmt --check

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Install Qt6 dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y g++ qt6-base-dev qt6-declarative-dev qt6-tools-dev \
            qt6-tools-dev-tools qt6-l10n-tools libqt6opengl6-dev libqt6quickcontrols2-6 \
            qml6-module-qtquick qml6-module-qtquick-controls qml6-module-qtquick-layouts \
            qml6-module-qtquick-window cmake ninja-build

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust

      - name: Clippy
        working-directory: rust
        run: cargo clippy -- -D warnings

      - name: Build
        working-directory: rust
        run: cargo build --release
