name: CI

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Format
        working-directory: rust
        run: cargo fmt --check

  build:
    # CXX-Qt + Qt6 builds require a full Qt toolchain that is fragile on CI
    # runners. This job is informational — the lint job gates mergeability.
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y g++ libgl1-mesa-dev libvulkan-dev libxkbcommon-dev pkg-config cmake ninja-build

      - name: Install Qt6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.3'
          target: 'desktop'
          tools: 'tools_cmake'
          cache: true

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust

      - name: Clippy
        working-directory: rust
        run: cargo clippy -- -D warnings

      - name: Build
        working-directory: rust
        run: cargo build --release
