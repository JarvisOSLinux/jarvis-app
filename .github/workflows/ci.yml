name: CI

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Format
        working-directory: rust
        run: cargo fmt --check

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y g++ libgl1-mesa-dev libvulkan-dev libxkbcommon-dev pkg-config cmake ninja-build

      - name: Install Qt6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.3'
          target: 'desktop'
          tools: 'tools_cmake'
          cache: true

      - name: Verify Qt6 tools
        run: |
          echo "=== Qt env ==="
          echo "Qt6_DIR=${Qt6_DIR:-unset}"
          echo "QT_ROOT_DIR=${QT_ROOT_DIR:-unset}"
          echo "CMAKE_PREFIX_PATH=${CMAKE_PREFIX_PATH:-unset}"
          echo "=== qmltyperegistrar lookup ==="
          find "${QT_ROOT_DIR:-/home/runner/work/jarvisos-app/Qt}" -name 'qmltyperegistrar' -type f 2>/dev/null || echo "NOT FOUND"
          echo "=== Qt libexec contents ==="
          ls -la "${QT_ROOT_DIR:-/home/runner/work/jarvisos-app/Qt/6.8.3/gcc_64}"/libexec/ 2>/dev/null || echo "no libexec dir"

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust

      - name: Clippy
        working-directory: rust
        run: cargo clippy -- -D warnings

      - name: Build
        working-directory: rust
        run: cargo build --release
